<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Stay Tooned GFX — webcomics that wander freely, laugh strangely.">
  <title>Stay Tooned GFX</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee+Inline&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="icon" href="assets/favicon-32x32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="assets/favicon-16x16.png" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" sizes="180x180">
  <link rel="manifest" href="assets/site.webmanifest">
  <meta name="theme-color" content="#0e0e0e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Stay Tooned GFX">
</head>
<body class="page-home">

  <!-- 🔝 SITE HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo">
        <img src="assets/logo.png" alt="Stay Tooned GFX" onerror="this.style.display='none'">

      </a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="blog.html">Blog</a>
        <!-- Replace # with your Ko-fi, PayPal, or Patreon link -->
        <a href="#" class="nav-donate" target="_blank" rel="noopener">Donate</a>
      </nav>
    </div>
  </header>

  <main>

    <!-- 🏠 HERO -->
    <section class="home-hero">
      <div id="hero-phrase" class="hero-phrase" role="img" aria-label="Stay Tooned GFX"></div>
      <p>Comics that wander freely, laugh strangely.</p>
    </section>

    <!-- 📚 SERIES GRID — populated by app.js -->
    <section class="section series-picker">
      <p class="section-title">Pick a Series</p>
      <div id="series-grid" class="series-grid">
        <p class="loading">Loading series…</p>
      </div>
    </section>

    <!-- 🕐 LATEST UPDATES — populated by app.js -->
    <section class="section" style="padding-top:0">
      <p class="section-title">Latest Updates</p>
      <div id="latest-updates" class="update-list">
        <p class="loading">Loading updates…</p>
      </div>
    </section>

    <!-- 📬 MAILCHIMP SUBSCRIBE -->
    <section id="subscribe" class="subscribe-section">
      <div class="subscribe-inner">
        <h2>Stay in the Loop</h2>
        <p>Get notified when new comics drop — no spam, ever.</p>

        <!-- ═══════════════════════════════════════════════
             MAILCHIMP EMBED
             Log in → Audience → Signup forms → Embedded forms
             Copy the embed code and paste it here.
             ═══════════════════════════════════════════════ -->
        <div id="mc_embed_signup">
          <form action="YOUR_MAILCHIMP_ACTION_URL_HERE" method="post"
                id="mc-embedded-subscribe-form" name="mc-embedded-subscribe-form" target="_blank">
            <div id="mc_embed_signup_scroll">
              <input type="email" name="EMAIL" id="mce-EMAIL"
                     placeholder="your@email.com" required>
              <!-- bot trap — do not remove -->
              <div style="position:absolute;left:-5000px" aria-hidden="true">
                <input type="text" name="b_REPLACE_WITH_MAILCHIMP_VALUE" tabindex="-1" value="">
              </div>
              <input type="submit" value="Subscribe" name="subscribe"
                     id="mc-embedded-subscribe" class="button">
            </div>
          </form>
        </div>
        <!-- ═══════════════════════════════════════════════ -->

      </div>
    </section>

  </main>

  <!-- 🦶 FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="assets/logo.png" alt="" onerror="this.style.display='none'">

      </div>
      <p class="footer-copy">&copy; <span class="js-year"></span> Stay Tooned GFX. All characters and artwork are protected.</p>
      <nav class="footer-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="blog.html">Blog</a>
        <a href="archive.html">Archive</a>
        <a href="#" target="_blank" rel="noopener">Donate</a>
      </nav>
    </div>
  </footer>

  <script src="js/hero-type.js"></script>
  <script src="js/drag-order.js"></script>
  <script src="js/app.js"></script>
<script src="js/transition.js"></script>
<script src="js/wallpaper.js"></script>
<script src="js/cursor.js"></script>
<script src="js/construction.js"></script>
</body>
</html>
