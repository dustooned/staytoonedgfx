<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>404 — Stay Tooned GFX</title>
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="icon" href="assets/favicon-32x32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" sizes="180x180">
  <link rel="manifest" href="assets/site.webmanifest">
  <meta name="theme-color" content="#0e0e0e">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0e0e0e;
      font-family: system-ui, sans-serif;
      color: #fff;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      padding: 40px 24px;
    }

    /* Full-bleed pause GIF background */
    .page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('assets/site-bg-pause.gif') center / cover no-repeat;
      opacity: 0.45;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .code {
      font-size: clamp(8rem, 28vw, 18rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      color: #fff;
      text-shadow: 0 0 60px rgba(255,255,255,0.15);
    }

    .message {
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.04em;
    }

    .home-link {
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      border-bottom: 1px solid rgba(255,255,255,0.35);
      padding-bottom: 2px;
      transition: border-color 0.2s, color 0.2s;
    }

    .home-link:hover {
      color: rgba(255,255,255,0.7);
      border-color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="content">
      <div class="code">404</div>
      <p class="message">Whatever you were looking for wandered off. It does that.</p>
      <a href="index.html" class="home-link">← Back to Home</a>
    </div>
  </div>
</body>
</html>
