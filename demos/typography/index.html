<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Typography — Stay Tooned GFX</title>

  <!-- Bungee Inline — decorative inline-stroke display font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee+Inline&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="scene">

    <!--
      role="img" + aria-label: screen readers read the full phrase in one go.
      Individual .char spans are aria-hidden so letters aren't spelled out.
    -->
    <div
      id="phrase"
      class="phrase"
      role="img"
      aria-label="Stay Tooned GFX"
    ></div>

    <div class="controls" role="group" aria-label="Demo controls">
      <button id="btn-sound" aria-pressed="false">🔇 Sound</button>
      <button id="btn-mode"  aria-pressed="false">✦ Magnetic</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
