  <link rel="icon" href="assets/favicon-16x16.png" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" sizes="180x180">

<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo">

      <nav class="site-nav">

  <main>

      <div class="title-card-overlay"></div>

        <p class="loading">Loading…</p>
      </div>
    </div>

    <!-- 📦 CONTENT PANEL — gets backdrop when a series bg image is active -->

      <div class="section">
        <p class="section-title">Chapters</p>
        <div id="chapters-grid" class="chapters-grid">
          <p class="loading">Loading chapters…</p>

      <div class="footer-brand">
        <img src="assets/logo.svg" alt="" onerror="this.style.display='none'">
        Stay Tooned GFX

      <nav class="footer-nav">
